<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="box">
      <img src="./image.png" alt="" class="img img1 shaded" />
      <img src="./image.png" alt="" class="img img2 shaded" />
      <img src="./image.png" alt="" class="img img3 shaded" />
      <img src="./image.png" alt="" class="img img4 shaded" />
      <img src="./image.png" alt="" class="img img5 shaded" />

      <div class="mask"></div>
    </div>
  </body>

  <script>
    const shadedEls = [...document.querySelectorAll('.shaded')];
    const durationMs = 1100;
    const maxDelayMs = 120;
    const gapMs = 1380;
    const restFilters = [
      'saturate(0.78) contrast(1.14) brightness(0.82) hue-rotate(-8deg)',
      'saturate(0.82) contrast(1.16) brightness(0.8) hue-rotate(6deg)',
      'saturate(0.76) contrast(1.12) brightness(0.84) hue-rotate(-18deg)'
    ];
    const flashFilters = [
      'saturate(1.85) contrast(1.24) brightness(1.08) hue-rotate(-26deg)',
      'saturate(2.1) contrast(1.26) brightness(1.12) hue-rotate(18deg)',
      'saturate(1.7) contrast(1.2) brightness(1.06) hue-rotate(36deg)'
    ];

    function randomOffset(index) {
      const amplitude = 16 + (index % 4) * 9;
      return `${(Math.random() - 0.5) * amplitude * 2}px`;
    }

    function randomY(index) {
      const amplitude = index % 3 === 0 ? 8 : 5;
      return `${(Math.random() - 0.5) * amplitude * 2}px`;
    }

    function randomSkew(index) {
      const amplitude = 6 + (index % 3) * 5;
      return `${(Math.random() - 0.5) * amplitude * 2}deg`;
    }

    function triggerBlind() {
      let longestDelay = 0;

      shadedEls.forEach((el, index) => {
        const phaseOffset = (index % 3) * 70;
        const delayMs = phaseOffset + Math.random() * maxDelayMs;
        const restIndex = index % restFilters.length;
        const flashIndex = index % flashFilters.length;

        longestDelay = Math.max(longestDelay, delayMs);

        el.classList.remove('blind');
        void el.offsetWidth;

        el.style.setProperty('--delay', `${delayMs}ms`);
        el.style.setProperty('--tx1', randomOffset(index));
        el.style.setProperty('--tx2', randomOffset(index + 1));
        el.style.setProperty('--tx3', randomOffset(index + 2));
        el.style.setProperty('--ty1', randomY(index));
        el.style.setProperty('--ty2', randomY(index + 1));
        el.style.setProperty('--ty3', randomY(index + 2));
        el.style.setProperty('--tsx1', randomSkew(index));
        el.style.setProperty('--tsx2', randomSkew(index + 1));
        el.style.setProperty('--tsx3', randomSkew(index + 2));
        el.style.setProperty('--rest-filter', restFilters[restIndex]);
        el.style.setProperty('--fx1-filter', flashFilters[flashIndex]);
        el.style.setProperty(
          '--fx2-filter',
          flashFilters[(flashIndex + 1) % flashFilters.length]
        );
        el.style.setProperty(
          '--fx3-filter',
          flashFilters[(flashIndex + 2) % flashFilters.length]
        );

        el.classList.add('blind');
      });

      window.setTimeout(() => {
        shadedEls.forEach((el) => {
          el.classList.remove('blind');
        });

        window.setTimeout(triggerBlind, gapMs);
      }, durationMs + longestDelay);
    }

    triggerBlind();
  </script>
</html>
