<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="https://cdn.jsdelivr.net/npm/animejs/dist/bundles/anime.umd.min.js"></script>
  </head>
  <body>
    <div class="box"></div>
  </body>
  <script>
    const { animate } = anime;

    const boxEl = document.querySelector('.box');
    
    // 40 * 60
    const row = 10;
    const col = 10;
    for (let r = 0; r < row; r++) {
      for (let c = 0; c < col; c++) {
        const pieceEl = document.createElement('div');
        pieceEl.classList.add('piece');
        pieceEl.style.setProperty('--top', r * 60 + 'px');
        pieceEl.style.setProperty('--left', c * 40 + 'px');
        pieceEl.style.setProperty('--bpx', c * -40 + 'px');
        pieceEl.style.setProperty('--bpy', r * -60 + 'px');
        boxEl.appendChild(pieceEl);
      }
    }
    const piecesEl = document.querySelectorAll('.piece');
    const randomOffset = () => `${(Math.random() - 0.5) * 300}px`;
    const randomDegrees = () => `${(Math.random() - 0.5) * 300}deg`;
    const randomScale = () => `${(Math.random() - 0.5) * 10}`;
    boxEl.addEventListener('mouseover', () => {
      console.log('enter');
      animate(piecesEl, {
        rotateX: () => randomDegrees(),
        rotateY: () => randomDegrees(),
        rotateZ: () => randomDegrees(),
        scale: () => randomScale(),
        x: () => randomOffset(),
        y: () => randomOffset(),
        z: () => randomOffset(),
        ease: 'in(3)',
        duration: 1000
      });
    });

    boxEl.addEventListener('mouseout', () => {
      console.log('leave');
      animate(piecesEl, {
        rotateX: '0',
        rotateY: '0',
        rotateZ: '0',
        scale: 1,
        x: '0px',
        y: '0px',
        z: 0
      });
    });
  </script>
</html>
