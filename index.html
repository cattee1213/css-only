<!doctype html>
<html lang="zh-cn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="ring"></div>
      <div class="duration">
        <div class="duration-bar"></div>
        <span class="duration-text"></span>
      </div>
    </div>
    <div class="mask"></div>

    <audio src="./rule.mp3" class="player" controls></audio>
  </body>

  <script>
    const barCount = 64;
    const fftSize = 2048;
    const step = fftSize / 2 / barCount;
    const audio = document.querySelector('audio');
    const ring = document.querySelector('.ring');
    const container = document.querySelector('.container');
    const mask = document.querySelector('.mask');
    const durationBar = document.querySelector('.duration-bar');
    const durationText = document.querySelector('.duration-text');

    let duration = 0;

    for (let i = 0; i < barCount; i++) {
      const barsContainer = document.createElement('div');
      barsContainer.className = 'sound-bar-container';
      const barsBox = document.createElement('div');
      barsBox.className = 'sound-bar-box';
      barsContainer.appendChild(barsBox);
      const bars = document.createElement('div');
      bars.className = 'sound-bar';
      barsBox.appendChild(bars);

      bars.style.setProperty(
        '--bg-start',
        `hsl(${(i * 300) / barCount}, 100%, 50%, 0.8)`
      );
      bars.style.setProperty(
        '--bg-end',
        `hsl(${((i + 1) * 300) / barCount}, 100%, 50%, 0.8)`
      );

      container.appendChild(barsContainer);
    }
    const bars = document.querySelectorAll('.sound-bar');

    let audioContext, analyser, dataArray;
    document.querySelectorAll('.sound-bar').forEach((bar) => {
      bar.style.setProperty('--r', '-' + Math.random() + 's');
    });

    audio.addEventListener('loadedmetadata', () => {
      // metadata loaded
      duration = audio.duration;
      durationText.innerText = new Date(duration * 1000)
        .toISOString()
        .substr(14, 5);
    });

    audio.addEventListener('play', () => {
      if (!audioContext) {
        audioContext = new AudioContext().createMediaElementSource(
          document.querySelector('audio')
        );
        analyser = audioContext.context.createAnalyser();
        audioContext.connect(analyser);
        analyser.connect(audioContext.context.destination);

        analyser.fftSize = fftSize;

        const bufferLen = analyser.frequencyBinCount;
        dataArray = new Uint8Array(bufferLen);
      }

      if (ring.classList.contains('paused')) {
        ring.classList.remove('paused');
      }
      if (!ring.classList.contains('rotating')) {
        ring.classList.add('rotating');
      }

      mask.style.setProperty('opacity', 0);

      requestAni();
    });

    audio.addEventListener('pause', () => {
      if (!ring.classList.contains('paused')) {
        ring.classList.add('paused');
      }
      mask.style.setProperty('opacity', 1);
    });

    audio.addEventListener('ended', () => {
      if (!ring.classList.contains('paused')) {
        ring.classList.add('paused');
      }
      mask.style.setProperty('opacity', 1);
    });

    // 1024 / barCount
    function requestAni() {
      if (!analyser || audio.paused || audio.ended) return;
      requestAnimationFrame(requestAni);
      analyser.getByteFrequencyData(dataArray);

      bars.forEach((bar, i) => {
        let value = 0;
        for (let j = 0; j < step; j++) {
          value += dataArray[j + i * step];
        }
        value /= step * 255;

        const height = value * 300;
        if (height < 2) {
          bar.style.setProperty('transform', 'translateY(298px)');
          return;
        }
        bar.style.setProperty('transform', `translateY(${300 - height}px)`);
      });
    }

    document.querySelector('.ring').addEventListener('click', () => {
      if (audio.paused) {
        audio.play();
      } else {
        audio.pause();
      }
    });
  </script>
</html>
