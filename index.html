<!doctype html>
<html lang="zh-cn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="ring"></div>
    </div>
    <audio src="./rule.mp3" class="player" controls></audio>
  </body>

  <script>
    for (let i = 0; i < 32; i++) {
      const bars = document.createElement('div');
      bars.className = 'sound-bar';
      bars.style.setProperty(
        '--bg-start',
        `hsl(${(i * 360) / 32}, 100%, 50%, 0.5)`
      );
      bars.style.setProperty(
        '--bg-end',
        `hsl(${((i + 1) * 360) / 32}, 100%, 50%, 0.5)`
      );
      document.querySelector('.container').appendChild(bars);
    }

    const audio = document.querySelector('audio');
    const ring = document.querySelector('.ring');
    let audioContext, analyser, dataArray;
    document.querySelectorAll('.sound-bar').forEach((bar) => {
      bar.style.setProperty('--r', '-' + Math.random() + 's');
    });

    audio.addEventListener('play', () => {
      if (!audioContext) {
        audioContext = new AudioContext().createMediaElementSource(
          document.querySelector('audio')
        );
        analyser = audioContext.context.createAnalyser();
        audioContext.connect(analyser);
        analyser.connect(audioContext.context.destination);

        analyser.fftSize = 2048;

        const bufferLen = analyser.frequencyBinCount;
        dataArray = new Uint8Array(bufferLen);
      }

      if (ring.classList.contains('paused')) {
        ring.classList.remove('paused');
      }
      if (!ring.classList.contains('rotating')) {
        ring.classList.add('rotating');
      }
      requestAni();
    });

    audio.addEventListener('pause', () => {
      if (!ring.classList.contains('paused')) {
        ring.classList.add('paused');
      }
    });

    audio.addEventListener('ended', () => {
      if (!ring.classList.contains('paused')) {
        ring.classList.add('paused');
      }
    });

    // 1024 / 32 = 32, 每个bar占16个频率数据
    function requestAni() {
      if (!analyser || audio.paused || audio.ended) return;
      requestAnimationFrame(requestAni);
      analyser.getByteFrequencyData(dataArray);

      document.querySelectorAll('.sound-bar').forEach((bar, i) => {
        let value = 0;
        for (let j = 0; j < 32; j++) {
          value += dataArray[j + i * 32];
        }
        value /= 32 * 255;

        const height = value * 300;
        if (height < 2) {
          bar.style.setProperty('--bar-height', '2px');
          return;
        }
        bar.style.setProperty('--bar-height', height + 'px');
      });
    }

    document.querySelector('.ring').addEventListener('click', () => {
      if (audio.paused) {
        audio.play();
      } else {
        audio.pause();
      }
    });
  </script>
</html>
